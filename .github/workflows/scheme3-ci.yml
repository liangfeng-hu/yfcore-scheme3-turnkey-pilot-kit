name: Scheme-3 CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Versions
        run: |
          docker --version
          docker compose version
          python --version

      - name: Run Scheme-3 verification
        run: |
          mkdir -p data
          bash scripts/verify_scheme3.sh

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs --no-color --tail=300 || true

      - name: Teardown
        if: always()
        run: |
          docker compose down -v || true
